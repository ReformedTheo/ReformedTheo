name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: reformedtheo
          template: classic
          base: "" 
          config_timezone: America/Sao_Paulo
          
          # Plugin de Linguagens
          plugin_languages: yes
          plugin_languages_ignored: html, css, cmake, json, yaml, markdown
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_colors: "python:#7951d6, go:#7951d6, cpp:#7951d6, typescript:#3178c6, javascript:#f1e05a"
          plugin_languages_sections: most-used
